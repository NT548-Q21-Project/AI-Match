services:
  postgres:
    image: postgres:16
    container_name: aimatch-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aimatch_db
    ports:
      - "5432:5432"
    volumes:
      - aimatch_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aimatch_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16
    container_name: aimatch-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aimatch_test_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aimatch_test_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  identity-service:
    build:
      context: ./backend/services/identity-service
      dockerfile: Dockerfile
    image: aimatch-identity-service
    container_name: aimatch-identity-service
    environment:
      APP_NAME: AIMatch Identity Service
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/aimatch_db
      JWT_SECRET_KEY: dev-secret-key
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  aimatch_postgres_data:
  postgres_test_data:
