server {
  listen 80;
  server_name _;
  root /var/www/html;
  index index.html;

  include /etc/nginx/mime.types;

  types {
    application/javascript mjs;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /favicon.ico {
    access_log off;
    log_not_found off;
    try_files /favicon.ico =404;
  }

  location = /.well-known/appspecific/com.chrome.devtools.json {
    access_log off;
    log_not_found off;
    return 404;
  }
}
