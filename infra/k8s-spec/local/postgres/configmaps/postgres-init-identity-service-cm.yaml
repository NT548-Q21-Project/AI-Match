apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-identity-init-script
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";
    
    CREATE TABLE IF NOT EXISTS auth_credentials (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        email VARCHAR(255) UNIQUE NOT NULL,
        password_hash TEXT NOT NULL,
        role VARCHAR(50) NOT NULL
            CHECK (role IN ('candidate', 'recruiter')),
        status VARCHAR(50) NOT NULL DEFAULT 'active'
            CHECK (status IN ('active', 'inactive', 'banned')),
        created_at TIMESTAMP NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS users (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        auth_id UUID UNIQUE NOT NULL
            REFERENCES auth_credentials(id)
            ON DELETE CASCADE,
        email VARCHAR(255) UNIQUE NOT NULL,
        full_name VARCHAR(255) NOT NULL,
        role VARCHAR(50) NOT NULL
            CHECK (role IN ('candidate', 'recruiter')),
        created_at TIMESTAMP NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_auth_credentials_email
    ON auth_credentials(email);

    CREATE INDEX IF NOT EXISTS idx_auth_credentials_role
    ON auth_credentials(role);

    CREATE INDEX IF NOT EXISTS idx_users_auth_id
    ON users(auth_id);

    CREATE INDEX IF NOT EXISTS idx_users_email
    ON users(email);

    CREATE INDEX IF NOT EXISTS idx_users_role
    ON users(role);
