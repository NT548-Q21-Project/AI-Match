repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.8
    hooks:
      - id: ruff
        name: ruff backend services
        args:
          [
            "--fix",
            "--config",
            "backend/services/identity-service/pyproject.toml",
          ]
        files: ^backend/services/identity-service/app/.*\.py$

      - id: ruff-format
        name: ruff format backend services
        args:
          [
            "--config",
            "backend/services/identity-service/pyproject.toml",
          ]
        files: ^backend/services/identity-service/app/.*\.py$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
