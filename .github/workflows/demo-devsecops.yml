name: Demo DevSecOps Pipeline (No AWS Required)

on:
  push:
    branches:
      - "feature/devsecops-loki"

env:
  PYTHON_VERSION: "3.12"
  SERVICE_PATH: "backend/services/ai-service" 
  IMAGE_NAME: "aimatch-ai-service"

jobs:
  build-scan-and-push:
    name: Build, Scan with Trivy, and Push to Docker Hub
    runs-on: ubuntu-latest
    
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.SERVICE_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image locally
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_PATH }}
          file: ${{ env.SERVICE_PATH }}/Dockerfile
          push: false 
          load: true 
          tags: ${{ env.IMAGE_NAME }}:latest

      - name: Quét lỗ hổng bảo mật Docker Image với Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:latest'
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image to Docker Hub
        if: success()
        run: |
          # Đổi tag image để có tiền tố là username Docker Hub của bạn
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest